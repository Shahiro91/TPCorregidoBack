{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crear Plan</title>
    <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
</head>
<body>
    <main class="page-content">
        <section class="page-header">
            <h1>Crear Plan</h1>
            <a href="{% url 'admin_panel' %}" class="btn">Volver</a>
        </section>

        <section class="card">
            <form method="post">
                {% csrf_token %}
                <div>
                    <label>Nombre</label>
                    <input type="text" name="nombre" value="{{ nombre|default:'' }}">
                </div>
                <div>
                    <label>Precio</label>
                    <input type="text" name="precio" value="{{ precio|default:'' }}">
                </div>
                <div>
                    <label>Duración</label>
                    <input type="text" name="duracion" value="{{ duracion|default:'' }}">
                </div>
                <div>
                    <label>Descripción</label>
                    <textarea name="descripcion">{{ descripcion|default:'' }}</textarea>
                </div>
                <div style="margin-top:1rem;">
                    <button type="submit" class="btn btn-primary">Crear Plan</button>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
