{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crear Profesor</title>
    <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
</head>
<body>
    <main class="page-content">
        <section class="page-header">
            <h1>Crear Profesor</h1>
            <a href="{% url 'admin_panel' %}" class="btn">Volver</a>
        </section>

        <section class="card">
            <form method="post">
                {% csrf_token %}
                <div>
                    <label>Nombre</label>
                    <input type="text" name="nombre" value="{{ nombre|default:'' }}">
                </div>
                <div>
                    <label>Apellido</label>
                    <input type="text" name="apellido" value="{{ apellido|default:'' }}">
                </div>
                <div>
                    <label>Clases (seleccioná una o más)</label>
                    <select name="clases" multiple size="6">
                        {% for clase in clases %}
                            <option value="{{ clase.id }}">{{ clase.nombre }} — {{ clase.horario }}</option>
                        {% empty %}
                            <option disabled>No hay clases</option>
                        {% endfor %}
                    </select>
                </div>
                <div style="margin-top:1rem;">
                    <button type="submit" class="btn btn-primary">Crear Profesor</button>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
