<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Center GYM - Nuevo Reclamo</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
</head>
<body>
    <div class="topbar">
        <div class="brand">CENTER GYM</div>
        <div class="nav">
            <a href="{% url 'alumno:dashboard' alumno.id %}">Mi Panel</a>
            <a href="{% url 'alumno:mis_clases' alumno.id %}">Mis Clases</a>
            <a href="{% url 'alumno:mis_reclamos' alumno.id %}">Mis Reclamos</a>
            <a href="{% url 'alumno:crear_reclamo' alumno.id %}" class="active">Nuevo Reclamo</a>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                <h2>NUEVO RECLAMO</h2>
                <div class="muted">Alumno: {{ alumno.nombre }} {{ alumno.apellido }}</div>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div style="background:#f8d7da; color:#721c24; padding:12px; border-radius:6px; margin-bottom:15px;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div style="margin-bottom:20px">
                    <label for="contenido" style="display:block; margin-bottom:8px; font-weight:600;">Descripción del reclamo</label>
                    <textarea id="contenido" name="contenido" rows="5" required 
                              placeholder="Contanos qué sucedió..." 
                              style="width:100%; padding:12px; border:1px solid #ddd; border-radius:6px; font-family:inherit; font-size:14px;"></textarea>
                </div>
                
                <div style="display:flex; gap:12px;">
                    <button type="submit" class="btn" style="background:#ff8a00; outline: none;; color:white; border:none; cursor:pointer;">Enviar Reclamo</button>
                    <a href="{% url 'alumno:mis_reclamos' alumno.id %}" class="btn" style="background:#ff8a00; color:white; text-decoration:none;">Cancelar</a>
                </div>
            </form>

        </div>

        <div class="app-footer">
            <img src="{% static 'LogoAppGym.png' %}" alt="Logo Center GYM">
        </div>
    </div>
</body>
</html>
